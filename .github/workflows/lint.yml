name: Addon Lint (reusable)

on:
  workflow_call:
    inputs:
      addon-path:
        description: "Path to the add-on directory (contains config.yaml)"
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Require changelog for add-on changes
        if: github.event_name == 'pull_request'
        env:
          ADDON_PATH: ${{ inputs.addon-path }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          changed_files=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          if ! grep -q "^${ADDON_PATH}/" <<< "$changed_files"; then
            exit 0
          fi

          if ! grep -qx "${ADDON_PATH}/CHANGELOG.md" <<< "$changed_files"; then
            echo "Changes in ${ADDON_PATH}/ require an update to ${ADDON_PATH}/CHANGELOG.md."
            exit 1
          fi

      - name: Lint ${{ inputs.addon-path }}
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ inputs.addon-path }}"
