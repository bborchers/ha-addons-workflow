name: Addon Lint (reusable)

on:
  workflow_call:
    inputs:
      addon-path:
        description: "Pfad zum Addon-Verzeichnis (enthält config.yaml)"
        required: true
        type: string

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint ${{ inputs.addon-path }}
        uses: frenck/action-addon-linter@v2
        with:
          path: "./${{ inputs.addon-path }}"
